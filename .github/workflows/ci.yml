name: CI
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -e ".[dev]"
      - run: flake8 src/ tests/ --max-line-length=100 --extend-ignore=E203,W503
      - run: black --check --line-length 100 src/ tests/
      - run: pytest tests/ --cov=gem_pipeline --cov-report=term-missing --tb=short -v
